<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ergosphere — Cursos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  /* HERO */
  .hero{text-align:center;padding:44px 24px 26px}
  .badge{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--gold-wash);border:1px solid rgba(200,168,106,.28);
    border-radius:999px;padding:6px 15px;font-size:13px;color:var(--gold-bright);margin-bottom:24px;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--gold-bright);box-shadow:0 0 10px var(--gold-bright)}
  .hero h1{font-size:44px;font-weight:800;letter-spacing:-1.2px}
  .hero h1 .accent{
    background:linear-gradient(var(--gold-bright),var(--gold-dim));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .hero p{color:var(--text-2);margin-top:14px;font-size:16px}
  .search-big{
    max-width:1000px;margin:28px auto 0;
    display:flex;align-items:center;gap:12px;
    background:var(--plate);border:1px solid var(--hair-strong);
    border-radius:var(--radius-lg);padding:16px 20px;color:var(--muted);font-size:15px;
    transition:border-color .2s;
  }
  .search-big:hover{border-color:rgba(200,168,106,.35)}

  /* LAYOUT */
  .layout{max-width:1240px;margin:36px auto 70px;padding:0 24px;display:grid;grid-template-columns:224px 1fr;gap:30px}

  /* SIDEBAR */
  .side-title{font-size:11px;letter-spacing:1.5px;color:var(--muted);margin-bottom:14px;font-weight:600}
  .cat{
    display:flex;align-items:center;gap:11px;
    padding:11px 14px;border-radius:var(--radius);font-size:14px;color:var(--text-2);
    cursor:pointer;transition:background .15s,color .15s;position:relative;
  }
  .cat:hover{background:var(--plate);color:var(--text)}
  .cat.active{background:var(--gold-wash);color:var(--gold-bright);font-weight:600}
  .cat.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--gold)}
  .cat .ico{width:16px;text-align:center;filter:grayscale(.2)}

  /* MAIN */
  .main-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
  .main-head .showing{color:var(--text-2);font-size:14px}
  .sort{
    display:flex;align-items:center;gap:8px;
    background:var(--plate);border:1px solid var(--hair);border-radius:var(--radius);
    padding:9px 14px;font-size:14px;color:var(--text-2);cursor:pointer;
  }
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}

  @media(max-width:1080px){
    .grid{grid-template-columns:repeat(2,1fr)}
    .layout{grid-template-columns:186px 1fr}
  }
  @media(max-width:680px){
    .layout{grid-template-columns:1fr}
    .side{display:none}
    .grid{grid-template-columns:repeat(2,1fr)}
    .hero h1{font-size:31px}
  }
</style>
</head>
<body>

<div class="nav-wrap">
  <nav class="nav">
    <a href="index.html" class="brand">
      <span class="ring"></span>
      <span class="wordmark">Ergo<b>sphere</b></span>
    </a>
    <div class="nav-links">
      <a href="index.html">Cursos</a>
      <a href="#">Pedir Curso</a>
      <a href="assinar/">Assinar</a>
    </div>
    <div class="nav-right">
      <div class="search-mini">🔍 Buscar... <span class="kbd">⌘K</span></div>
      <div class="cart">🛒</div>
      <a href="#" class="btn-gold">Entrar →</a>
    </div>
  </nav>
</div>

<section class="hero">
  <div class="badge"><span class="dot"></span> Cursos disponíveis</div>
  <h1>Explore Nossos <span class="accent">Cursos</span></h1>
  <p>Encontre o curso ideal para impulsionar sua carreira com acesso vitalício</p>
  <div class="search-big">🔍 Buscar cursos, instrutores...</div>
</section>

<div class="layout">
  <aside class="side">
    <div class="side-title">CATEGORIAS</div>
    <div class="cat active"><span class="ico">▦</span> Todas</div>
    <div class="cat"><span class="ico">📈</span> Marketing Digital</div>
  </aside>

  <main>
    <div class="main-head">
      <div class="showing">Todos os cursos</div>
      <div class="sort">↗ Mais Populares ⌄</div>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<script>
  const cursos = [
    {
      t:"OUTBOX CLUB",
      i:"LUIGGI STECCA",
      a:"143 aulas",
      h:"70h 34min",
      p:"R$ 60,00",
      slug:"outbox-club"
    },
    {
      t:"BLACK ADS",
      i:"LUIGGI STECCA",
      a:"47 aulas",
      h:"11h 4min",
      p:"R$ 29,90",
      slug:"black-ads"
    },
    {
      t:"COPY LOW",
      i:"LUIGGI STECCA",
      a:"56 aulas",
      h:"11h 8min",
      p:"R$ 29,90",
      slug:"copy-low"
    },
  ];

  document.getElementById('grid').innerHTML = cursos.map(c=>`
    <a class="card" href="curso/${c.slug}/">
      <div class="thumb">
        <img src="curso/${c.slug}/capa.png" alt="${c.t} — ${c.i}">
      </div>
      <div class="card-body">
        <div class="card-title">${c.t}</div>
        <div class="instructor"><span class="av"></span> ${c.i}</div>
        <div class="pills">
          <span class="pill">📖 ${c.a}</span>
          <span class="pill">⏱ ${c.h}</span>
        </div>
        <div class="card-foot">
          <span class="price">${c.p}</span>
          <span class="btn-ver">Ver →</span>
        </div>
      </div>
    </a>
  `).join('');
</script>

</body>
</html>
